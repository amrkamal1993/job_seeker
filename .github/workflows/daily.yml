name: Daily Jobs Refresh

on:
  schedule:
    # 07:00 UTC  ==  09:00 Cairo (Egypt is UTC+2 year-round)
    - cron: "0 7 * * *"
  workflow_dispatch: {} # allow manual run from Actions tab

permissions:
  contents: write

concurrency:
  group: daily-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography==43.*

      - name: Build & encrypt dashboard
        env:
          JSEARCH_API_KEY:    ${{ secrets.JSEARCH_API_KEY }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python scripts/daily_refresh.py

      - name: Verify encryption (no plaintext leak)
        run: |
          set -eu
          if grep -qE '"company":|careers@' index.html; then
            echo "❌ Plaintext leak detected in index.html"; exit 1
          fi
          if ! grep -q '"salt":' index.html; then
            echo "❌ Encrypted payload missing from index.html"; exit 1
          fi
          echo "✓ Encryption verified — no plaintext leaks."

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.email "amr2010kamal@gmail.com"
          git config user.name  "github-actions[bot]"

          git add index.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi

          git commit -m "Daily encrypted refresh: $(date -u +%Y-%m-%d)"

          # Bring runner up-to-date with remote main, then push
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
